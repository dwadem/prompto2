services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-backend
    runtime: docker
    rootDir: backend
    # "starter" plan is required for the persistent disk below ($7/mo).
    # Downgrade to "free" if you accept losing the SQLite DB on every restart
    # (the app re-seeds from the committed sample JSON automatically, so it
    # still works — you just lose any Playwright-scraped data).
    plan: starter
    healthCheckPath: /api/health
    # Persistent disk keeps the SQLite DB across restarts and deploys.
    # DATA_DIR stays at /app/data (committed JSON files in the Docker image);
    # only the database file lives on the disk.
    disk:
      name: rzeszow-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_SOURCE
        value: json_cache
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        value: "sqlite:////var/data/rzeszow.db"
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Set VITE_API_URL in the Render dashboard to your backend URL
    # (https://rzeszow-backend.onrender.com), then redeploy the frontend
    # so Vite bakes it into the JS bundle.
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
