services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-backend
    runtime: docker
    # Paths are relative to the repo root.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATA_SOURCE
        value: json_cache
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        value: sqlite:///./data/rzeszow.db
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-frontend
    runtime: static
    # buildCommand runs from the repo root.
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    # VITE_API_URL must be set manually in the Render dashboard after the
    # backend service is deployed (Render shows its URL there).
    # Set it to: https://<your-backend>.onrender.com
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: send all paths to index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html
