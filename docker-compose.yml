services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rzeszow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/rzeszow.db
      - DATA_DIR=/app/data
      - DATA_SOURCE=${DATA_SOURCE:-json_cache}
      - OTODOM_BASE_URL=${OTODOM_BASE_URL:-https://www.otodom.pl}
      - REQUEST_DELAY_S=${REQUEST_DELAY_S:-2.0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rzeszow_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
