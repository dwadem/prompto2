databases:
  - name: rzeszow-db
    plan: free
    databaseName: rzeszow
    user: rzeszow

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rzeszow-db
          property: connectionString
      - key: DATA_SOURCE
        value: json_cache
      - key: DATA_DIR
        value: /app/data
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Set VITE_API_URL in the Render dashboard to your backend URL
    # (https://rzeszow-backend.onrender.com), then redeploy the frontend.
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
