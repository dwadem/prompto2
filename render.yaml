services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-backend
    runtime: docker
    # rootDir makes Render treat backend/ as the project root, so it finds
    # backend/Dockerfile automatically (dockerfilePath/context default to it).
    rootDir: backend
    plan: free
    envVars:
      - key: DATA_SOURCE
        value: json_cache
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        value: sqlite:///./data/rzeszow.db
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: rzeszow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # VITE_API_URL must be set manually in the Render dashboard after the
    # backend service is deployed, then trigger a redeploy so Vite bakes it in.
    # Value: https://<your-backend>.onrender.com
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: send all paths to index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html
